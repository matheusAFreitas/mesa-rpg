<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mesa do Mestre</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#030504;--bg2:#06100A;--bg3:#0C1A0D;--border:#112810;
  --accent:#3EC96D;--text:#B8D8B0;--text2:#5E9654;
  --ok:#5AB845;--danger:#B03010;
  --ff:'Chakra Petch',system-ui,sans-serif;
  --fm:'Share Tech Mono','Courier New',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg);color:var(--text);
  font-family:var(--ff);min-height:100vh;
  display:flex;align-items:center;justify-content:center;
}
body::before{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(to bottom,transparent 0px,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 3px);
  pointer-events:none;z-index:9999;
}

.landing{text-align:center;width:100%;max-width:480px;padding:40px 24px;}
.landing h1{
  font-size:22px;letter-spacing:6px;text-transform:uppercase;
  color:var(--accent);margin-bottom:6px;
  font-family:var(--fm);
  text-shadow:0 0 24px rgba(62,201,109,0.55);
}
.landing p{color:var(--text2);font-size:10px;margin-bottom:48px;font-family:var(--fm);letter-spacing:2px;text-transform:uppercase;}

.cards{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;}
.role-card{
  background:var(--bg2);border:1px solid var(--border);
  padding:32px 28px;cursor:pointer;
  transition:border-color .15s,transform .12s,box-shadow .15s;
  width:190px;text-decoration:none;color:var(--text);
  position:relative;border-radius:2px;
}
.role-card::before,.role-card::after{
  content:'';position:absolute;width:10px;height:10px;
  border-color:var(--accent);border-style:solid;opacity:0;transition:opacity .2s;
}
.role-card::before{top:-1px;left:-1px;border-width:2px 0 0 2px;}
.role-card::after{bottom:-1px;right:-1px;border-width:0 2px 2px 0;}
.role-card:hover{border-color:rgba(62,201,109,0.35);transform:translateY(-3px);box-shadow:0 6px 24px rgba(62,201,109,0.1);}
.role-card:hover::before,.role-card:hover::after{opacity:1;}
.role-card .icon{font-size:32px;margin-bottom:12px;}
.role-card .label{font-size:13px;font-weight:600;margin-bottom:4px;text-transform:uppercase;letter-spacing:2px;}
.role-card .sub{font-size:10px;color:var(--text2);font-family:var(--fm);letter-spacing:1px;}

/* Player link banner */
.player-link{
  margin-top:40px;
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:2px;
  padding:16px 20px;
  position:relative;
}
.player-link::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(to right,transparent,var(--accent) 30%,var(--accent) 70%,transparent);
  opacity:0.5;
}
.player-link-label{
  font-size:9px;text-transform:uppercase;letter-spacing:2px;
  color:var(--text2);font-family:var(--fm);margin-bottom:10px;
}
.player-link-row{display:flex;align-items:center;gap:10px;}
.player-link-url{
  flex:1;font-family:var(--fm);font-size:15px;
  color:var(--accent);letter-spacing:1px;
  text-decoration:none;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.player-link-url:hover{text-decoration:underline;}
.copy-btn{
  padding:5px 12px;border:1px solid var(--border);border-radius:2px;
  background:var(--bg3);color:var(--text2);cursor:pointer;
  font-size:10px;font-family:var(--fm);letter-spacing:1px;
  text-transform:uppercase;transition:all .15s;white-space:nowrap;flex-shrink:0;
}
.copy-btn:hover{border-color:var(--accent);color:var(--accent);}
.copy-btn.copied{border-color:var(--ok);color:var(--ok);}

/* Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:100;align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.modal{
  background:var(--bg2);border:1px solid var(--border);
  padding:28px;width:320px;
  position:relative;border-radius:2px;
}
.modal::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(to right,transparent,var(--accent) 30%,var(--accent) 70%,transparent);
  opacity:0.7;
}
.modal h3{font-size:12px;margin-bottom:6px;text-transform:uppercase;letter-spacing:2px;color:var(--accent);font-family:var(--fm);}
.modal p{font-size:11px;color:var(--text2);margin-bottom:18px;line-height:1.6;font-family:var(--fm);letter-spacing:.5px;}
.modal input{
  width:100%;padding:9px 12px;background:var(--bg3);
  border:1px solid var(--border);border-radius:2px;
  color:var(--accent);font-size:16px;letter-spacing:4px;
  margin-bottom:6px;font-family:var(--fm);
}
.modal input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 10px rgba(62,201,109,0.12);}
.error{color:var(--danger);font-size:11px;min-height:16px;margin-bottom:10px;font-family:var(--fm);letter-spacing:.5px;}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;}
.btn{
  padding:7px 16px;border:1px solid transparent;border-radius:2px;
  cursor:pointer;font-size:11px;font-weight:600;
  font-family:var(--ff);letter-spacing:1.2px;text-transform:uppercase;
  transition:all .15s;
}
.btn:hover{opacity:.85;filter:brightness(1.08);}
.btn-primary{background:var(--accent);color:#0A0805;border-color:var(--accent);}
.btn-secondary{background:var(--bg3);color:var(--text);border-color:var(--border);}
</style>
</head>
<body>

<div class="landing">
  <h1>Mesa do Mestre</h1>
  <p>Sistema de gerenciamento para RPG de mesa</p>
  <div class="cards">
    <div class="role-card" onclick="GM.open()">
      <div class="icon">🎲</div>
      <div class="label">Mestre</div>
      <div class="sub">Gerenciar campanha</div>
    </div>
    <a class="role-card" href="/jogador">
      <div class="icon">⚔️</div>
      <div class="label">Jogador</div>
      <div class="sub">Ver minha ficha</div>
    </a>
  </div>

  <div class="player-link" id="player-link" style="display:none;">
    <div class="player-link-label">Link para jogadores</div>
    <div class="player-link-row">
      <a class="player-link-url" id="player-url" href="#" target="_blank"></a>
      <button class="copy-btn" id="copy-btn" onclick="copyLink()">Copiar</button>
    </div>
  </div>
</div>

<!-- Modal de senha do Mestre -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h3 id="modal-title">Acesso do Mestre</h3>
    <p id="modal-desc">Digite a senha para continuar.</p>
    <input id="pw-input" type="password" placeholder="Senha..." autocomplete="off">
    <div class="error" id="pw-error"></div>
    <div class="modal-btns">
      <button class="btn btn-secondary" onclick="GM.close()">Cancelar</button>
      <button class="btn btn-primary" id="pw-btn" onclick="GM.submit()">Entrar</button>
    </div>
    <div id="reset-wrap" style="text-align:center;margin-top:14px;display:none;">
      <button onclick="GM.resetPassword()" style="background:none;border:none;color:var(--text2);font-size:11px;cursor:pointer;text-decoration:underline;font-family:var(--fm);letter-spacing:.5px;">Esqueci a senha — resetar acesso</button>
    </div>
  </div>
</div>

<script>
const GM = {
  mode: 'verify', // 'verify' | 'setup'

  async open() {
    const res = await fetch('/api/gm/auth');
    const { hasPassword } = await res.json();
    this.mode = hasPassword ? 'verify' : 'setup';

    document.getElementById('modal-title').textContent = hasPassword ? 'Acesso do Mestre' : 'Criar Senha do Mestre';
    document.getElementById('modal-desc').textContent = hasPassword
      ? 'Digite a senha para acessar a área do Mestre.'
      : 'Nenhuma senha configurada. Defina uma senha para proteger a área do Mestre.';
    document.getElementById('pw-btn').textContent = hasPassword ? 'Entrar' : 'Definir Senha';
    document.getElementById('reset-wrap').style.display = hasPassword ? 'block' : 'none';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-error').textContent = '';
    document.getElementById('overlay').classList.add('open');
    setTimeout(() => document.getElementById('pw-input').focus(), 50);
  },

  close() {
    document.getElementById('overlay').classList.remove('open');
  },

  async resetPassword() {
    if (!confirm('Resetar a senha? Você precisará criar uma nova no próximo acesso.')) return;
    await fetch('/api/gm/password', { method: 'DELETE' });
    window.location.href = '/mestre';
  },

  async submit() {
    const pw = document.getElementById('pw-input').value;
    if (!pw.trim()) {
      document.getElementById('pw-error').textContent = 'Senha não pode ser vazia.';
      return;
    }
    const res = await fetch('/api/gm/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw })
    });
    const data = await res.json();
    if (data.ok) {
      window.location.href = '/mestre';
    } else {
      document.getElementById('pw-error').textContent = 'Senha incorreta.';
      document.getElementById('pw-input').value = '';
      document.getElementById('pw-input').focus();
    }
  }
};

document.getElementById('pw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') GM.submit();
  if (e.key === 'Escape') GM.close();
});

// Exibe link da rede local para jogadores
fetch('/api/local-ip').then(r => r.json()).then(({ ip, port }) => {
  if (!ip) return;
  const url = `http://${ip}:${port}/jogador`;
  const el = document.getElementById('player-url');
  el.textContent = url;
  el.href = url;
  document.getElementById('player-link').style.display = 'block';
}).catch(() => {});

function copyLink() {
  const url = document.getElementById('player-url').textContent;
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copiado!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copiar'; btn.classList.remove('copied'); }, 2000);
  });
}
</script>
</body>
</html>
